<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="x-uat-compatible" content="ie=edge">
		<title>Add Student</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
		<link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
	<body>
		<div class="page-header">
			<h1><i class="bi bi-mortarboard-fill"></i> Student Management</h1>
			<p>Manage your students with ease</p>
		</div>

		<div class="glass-card">
			<a th:href="@{/students/list}" class="back-link">
				<i class="bi bi-arrow-left"></i> Back to List
			</a>

			<div class="form-wrapper">
				<div class="form-title">Add New Student</div>
				<form action="#" th:action="@{/students/add}" th:object="${student}" method="post">
					<div class="form-group">
						<label>Student Name</label>
						<input type="text" th:field="*{name}" id="name" placeholder="Enter full name">
					</div>
					<div class="form-group">
						<label>Student Group</label>
						<input type="text" th:field="*{studentGroup}" id="group" placeholder="e.g. Group A">
					</div>
					<div class="form-group">
						<label>Course</label>
						<input type="text" th:field="*{course}" id="course" placeholder="e.g. Computer Science">
					</div>
					<div class="form-group">
						<label>Age</label>
						<input type="number" th:field="*{age}" id="age" placeholder="Enter age">
					</div>
					<button type="submit" class="btn-submit">
						<i class="bi bi-person-check-fill"></i> Add Student
					</button>
				</form>
			</div>
		</div>
	</body>
</html>
