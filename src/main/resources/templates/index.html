<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="x-uat-compatible" content="ie=edge">
		<title>Student Management System</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
		<link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
	<body>
		<div class="page-header">
			<h1><i class="bi bi-mortarboard-fill"></i> Student Management</h1>
			<p>Manage your students with ease</p>
		</div>

		<div class="glass-card">
			<a th:href="@{/students/signup}" class="btn-add">
				<i class="bi bi-person-plus-fill"></i> Add New Student
			</a>

			<div th:switch="${students}">
				<div th:case="null" class="empty-state">
					<i class="bi bi-people"></i>
					<p>No students yet. Add your first one!</p>
				</div>
				<div th:case="*">
					<table class="student-table">
						<thead>
							<tr>
								<th>Name</th>
								<th>Group</th>
								<th>Course</th>
								<th>Age</th>
								<th>Actions</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="student : ${students}">
								<td th:text="${student.name}"></td>
								<td th:text="${student.studentGroup}"></td>
								<td th:text="${student.course}"></td>
								<td th:text="${student.age}"></td>
								<td>
									<a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn-edit">
										<i class="bi bi-pencil-fill"></i> Edit
									</a>
									<a th:href="@{/students/delete/{id}(id=${student.id})}" class="btn-delete">
										<i class="bi bi-trash-fill"></i> Delete
									</a>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</body>
</html>
